name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 18 * * *" # Roda todo dia às 15h (Horário de Brasília)
  workflow_dispatch:

permissions:
  contents: write # ESSENCIAL: Dá permissão para o robô salvar as imagens

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Remove o aviso de erro do Node 20
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          # Alterado para GH_TOKEN para pegar seus commits PRIVADOS
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          if git commit -m "generated 3D profile"; then
            git push
          fi
